<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CamHunter v2.0 | Ultimate Security Auditor</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body {
            background: var(--bg);
            color: white;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(112, 0, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(0, 242, 255, 0.1) 0%, transparent 40%);
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 1s ease;
        }

        .logo {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
        }

        .tagline { opacity: 0.6; font-size: 1.1rem; margin-top: 10px; }

        .main-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }

        .btn-discover {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: black;
            border: none;
            padding: 20px 50px;
            font-size: 1.4rem;
            font-weight: 800;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0, 242, 255, 0.3);
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 0 auto;
        }

        .btn-discover:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 242, 255, 0.5);
        }

        .results-section {
            margin-top: 50px;
            display: none;
        }

        .camera-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .cam-card {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 20px;
            animation: fadeInUp 0.5s ease backwards;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .status-vulnerable { background: rgba(255, 0, 0, 0.2); color: #ff4d4d; }
        .status-secure { background: rgba(0, 255, 0, 0.1); color: #4dff88; }
        .status-cracked { background: rgba(255, 170, 0, 0.2); color: #ffaa00; }

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .loader {
            display: none;
            width: 50px;
            height: 50px;
            border: 4px solid var(--border);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            margin: 20px auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 class="logo">CamHunter v2.0</h1>
            <p class="tagline">Next-Gen IP Camera Discovery & Security Auditor</p>
        </header>

        <div class="main-card">
            <h2 style="margin-bottom: 30px; font-weight: 400;">Ready to secure your network?</h2>
            <button class="btn-discover" id="discoverBtn">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
                Discover Everything
            </button>
            <div class="loader" id="loader"></div>
            <p id="statusMsg" style="margin-top: 20px; opacity: 0.7;"></p>
        </div>

        <section class="results-section" id="resultsSection">
            <h3 style="font-size: 1.5rem; margin-bottom: 20px;">Found Devices</h3>
            <div class="camera-grid" id="cameraGrid">
                <!-- Results populated by JS -->
            </div>
        </section>
    </div>

    <script>
        const discoverBtn = document.getElementById('discoverBtn');
        const loader = document.getElementById('loader');
        const statusMsg = document.getElementById('statusMsg');
        const resultsSection = document.getElementById('resultsSection');
        const cameraGrid = document.getElementById('cameraGrid');

        discoverBtn.onclick = async () => {
            discoverBtn.style.display = 'none';
            loader.style.display = 'block';
            statusMsg.innerText = "Scanning local network... please wait.";

            try {
                const response = await fetch('/api/discover', { method: 'POST' });
                const data = await response.json();
                
                // Simulate processing time
                setTimeout(fetchResults, 3000);
            } catch (err) {
                statusMsg.innerText = "Error initiating discovery.";
                discoverBtn.style.display = 'flex';
                loader.style.display = 'none';
            }
        };

        async function fetchResults() {
            try {
                const response = await fetch('/api/results');
                const cameras = await response.json();
                
                loader.style.display = 'none';
                statusMsg.innerText = `Audit Complete! Found ${cameras.length} devices.`;
                resultsSection.style.display = 'block';
                
                cameraGrid.innerHTML = cameras.map((cam, index) => `
                    <div class="cam-card" style="animation-delay: ${index * 0.1}s">
                        <div class="status-badge status-${cam.status.toLowerCase()}">${cam.status}</div>
                        <h4 style="font-size: 1.2rem; margin-bottom: 5px;">${cam.ip}</h4>
                        <p style="opacity: 0.6; font-size: 0.9rem;">Brand: ${cam.brand}</p>
                        <hr style="margin: 15px 0; border: none; border-top: 1px solid var(--border);">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span style="font-size: 0.8rem; opacity: 0.5;">Credentials</span>
                            <code style="background: rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 5px; font-size: 0.9rem; color: var(--primary);">${cam.auth}</code>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                statusMsg.innerText = "Error fetching results.";
            }
        }
    </script>
</body>
</html>
